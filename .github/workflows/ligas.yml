name: IvanPicks Ligas

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily o check'
        default: 'daily'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Determinar modo
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "mode=check" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode || 'daily' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python bot.py ${{ steps.mode.outputs.mode }}

      - name: Persist bot state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in api_requests.json sent_picks.json referee_history.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push